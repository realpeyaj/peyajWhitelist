# PeyajWhitelist Configuration

# Whether the whitelist is enabled on startup
enabled: true

# Whether maintenance mode is enabled on startup.
# If true, only players with OP status or permission 'peyajwhitelist.maintenance' can connect.
maintenance: false

# The message displayed to players who are not whitelisted.
# Supports legacy color codes (&) and hex color codes (&#FFFFFF)
kick-message: "&#ff4444&lPeyajWhitelist &7» &cYou are not whitelisted on this server!\n\n&7If you think this is a mistake, please contact the server administrator.\n&7Bedrock Players: Please provide your gamertag."

# Bedrock-specific kick message. Displays only to Bedrock players.
# If empty or not set, falls back to the default 'kick-message' above.
kick-message-bedrock: "&#ff4444&lPeyajWhitelist &7» &cYou are not whitelisted on this server!\n\n&7Please request access using your Bedrock Gamertag.\n&7If you have a Java account, you can link it using Floodgate."

# The message displayed to players kicked during maintenance mode.
kick-message-maintenance: "&#ff4444&lPeyajWhitelist &7» &cThe server is currently under maintenance!\n\n&7Please check back later. Staff members may bypass this using their bypass permissions."



# If true, the plugin will allow Bedrock players to join if they are whitelisted
# either with or without their Floodgate prefix (e.g. if prefix is '.', whitelisting
# 'John Doe' will allow '.John Doe' to join).
auto-detect-bedrock-prefix: true

# If true, the plugin will query LuckPerms (if installed) to check if a connecting
# player has the bypass permission ('peyajwhitelist.bypass'). If they do, they can join.
luckperms-bypass: true


# Enable debug logging in the console
debug: false

# Discord Webhook integration. Sends beautiful embeds when players attempt to connect.
discord-webhook:
  enabled: false
  url: "YOUR_DISCORD_WEBHOOK_URL_HERE"
  # Custom display name for the webhook bot
  username: "PeyajWhitelist"
  # Custom avatar image URL for the webhook bot (e.g. Imgur link)
  avatar-url: "YOUR_AVATAR_IMAGE_URL_HERE"
  # Notify when a connection is rejected by the whitelist
  notify-on-reject: true
  # Notify when a player is successfully whitelisted by an admin
  notify-on-whitelist: true
  # Custom styling for Discord Webhook embeds
  styling:
    reject:
      title: "❌ Whitelist Rejection"
      color: "#ff3332"
    whitelist:
      title: "✅ Player Whitelisted"
      color: "#3bc033"

# The maximum allowed players in the whitelist database.
# Set to -1 for unlimited. If reached, admins cannot add more players.
max-whitelist-entries: -1

# The message displayed to players when they are instantly kicked upon removal from the whitelist.
kick-message-removal: "&#ff4444&lPeyajWhitelist &7» &cYou have been removed from the whitelist!\n&7Please contact staff if you believe this is a mistake."

# In-game notification sounds and title alerts displayed on-screen to administrators
# when they successfully whitelist or approve a player.
admin-notifications:
  enabled: true
  sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  title: "&aPlayer Approved"
  subtitle: "&7%player% has been whitelisted"


